# CWE Vulnerability Classifier Configuration
# Based on: "Efficient CWE Vulnerability Classification Using CodeT5
#            with Template-Aware Dataset Splitting"

# Model Selection
model_name: microsoft/graphcodebert-base
available_models:
  - name: "CodeT5-Small"
    model_id: "Salesforce/codet5-small"
  - name: "CodeT5-Base"
    model_id: "Salesforce/codet5-base"
  - name: "CodeBERT-Base"
    model_id: "microsoft/codebert-base"
  - name: "GraphCodeBERT-Base"
    model_id: "microsoft/graphcodebert-base"
  - name: "CodeGemma-2B (QLoRA)"
    model_id: "google/codegemma-1.1-2b"
    qlora: true
  - name: "CodeGemma-2B (Zero-shot)"
    model_id: "google/codegemma-2b"
    inference_only: true
  - name: "Gemma 4 E2B IT (Zero-shot)"
    model_id: "google/gemma-4-E2B-it"
    inference_only: true
  - name: "BiLSTM-Attention"
    model_id: "bilstm-attention"
    dl_model: true
num_classes: 118

# Tokenization
max_length: 256

# Training
batch_size: 8
learning_rate: 5.0e-5
epochs: 2
weight_decay: 0.01
dropout: 0.1
seed: 42
fp16: true
gradient_accumulation_steps: 1

# Early stopping
patience: 1

# DataLoader
num_workers: 0
pin_memory: true

# Paths
dataset_root: datasets/2017-10-01-juliet-test-suite-for-c-cplusplus-v1-3/C/testcases
samples_path: data/processed/samples.parquet
train_path: data/processed/train.parquet
test_path: data/processed/test.parquet
label_map_path: data/processed/label_map.json
checkpoint_dir: outputs/checkpoints
log_dir: outputs/logs

# QLoRA Configuration
qlora:
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  quant_type: nf4
  use_double_quant: true
  gradient_checkpointing: true
  per_device_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  epochs: 5
  patience: 2

# Deep Learning (non-transformer) model configuration
dl:
  # Tokenizer to reuse for vocabulary (BPE tokenizer from CodeT5)
  tokenizer_name: Salesforce/codet5-small
  embedding_dim: 128
  hidden_dim: 256
  num_layers: 2
  dropout: 0.3
  learning_rate: 1.0e-3
  epochs: 10
  patience: 3
  batch_size: 32

# Logging
log_every_n_steps: 100

# Big-Vul Integration
bigvul_csv_path: datasets/big-vul/MSR_data_cleaned.csv
bigvul_samples_path: data/processed/bigvul_samples.parquet
cwe_overlap_report_path: data/processed/cwe_overlap_report.json

# Experiment Configuration
experiment:
  # dataset_mode: juliet_only | overlap_only | expanded
  dataset_mode: juliet_only
  bigvul_samples_path: data/processed/bigvul_samples.parquet
  combined_samples_path: data/processed/combined_samples.parquet
  combined_train_path: data/processed/combined_train.parquet
  combined_test_path: data/processed/combined_test.parquet
  combined_label_map_path: data/processed/combined_label_map.json
